<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 背景渐变：紫 → 橙 → 米黄 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="55%" stop-color="#fef3e0"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>

    <!-- 光晕 -->
    <radialGradient id="sun1" cx="25%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun2" cx="80%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- 星球渐变 -->
    <radialGradient id="planet1" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="planet2" cx="60%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="planet3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <!-- 模糊滤镜（远景星球） -->
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 主背景 -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- 光晕 -->
  <rect width="1600" height="900" fill="url(#sun1)"/>
  <rect width="1600" height="900" fill="url(#sun2)"/>

  <!-- 远景朦胧星球（带 blur） -->
  <circle cx="220" cy="720" r="130" fill="#fbbf24" opacity="0.25" filter="url(#blur1)"/>
  <circle cx="1400" cy="150" r="95" fill="#a78bfa" opacity="0.28" filter="url(#blur1)"/>
  <circle cx="1200" cy="680" r="60" fill="#60a5fa" opacity="0.25" filter="url(#blur1)"/>

  <!-- 漂浮星星 -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="150" cy="160" r="3"/>
    <circle cx="380" cy="80" r="2.5"/>
    <circle cx="520" cy="230" r="2"/>
    <circle cx="720" cy="120" r="3.5"/>
    <circle cx="900" cy="260" r="2"/>
    <circle cx="1080" cy="180" r="2.5"/>
    <circle cx="1250" cy="340" r="3"/>
    <circle cx="1420" cy="520" r="2.5"/>
    <circle cx="680" cy="780" r="2"/>
    <circle cx="480" cy="620" r="2.5"/>
    <circle cx="320" cy="480" r="2"/>
    <circle cx="1500" cy="380" r="2.5"/>
  </g>

  <!-- 行星 1（左上，大金黄色） -->
  <g transform="translate(1180, 160)">
    <circle cx="0" cy="0" r="95" fill="url(#planet1)" opacity="0.6" filter="url(#softShadow)"/>
    <circle cx="-20" cy="-25" r="18" fill="#ffffff" opacity="0.25"/>
    <circle cx="25" cy="15" r="12" fill="#ffffff" opacity="0.18"/>
    <circle cx="-5" cy="35" r="8" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- 行星 2（右中，紫色） -->
  <g transform="translate(1400, 520)">
    <circle cx="0" cy="0" r="65" fill="url(#planet2)" opacity="0.55" filter="url(#softShadow)"/>
    <circle cx="-12" cy="-18" r="10" fill="#ffffff" opacity="0.3"/>
    <circle cx="15" cy="10" r="7" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- 行星 3（左下，蓝色） -->
  <g transform="translate(1080, 720)">
    <circle cx="0" cy="0" r="50" fill="url(#planet3)" opacity="0.5" filter="url(#softShadow)"/>
  </g>

  <!-- 轨道（弧形线） -->
  <g fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.18">
    <ellipse cx="1300" cy="400" rx="280" ry="110" transform="rotate(-18 1300 400)"/>
    <ellipse cx="1200" cy="500" rx="180" ry="60" transform="rotate(10 1200 500)"/>
  </g>

  <!-- 书页/语言主题剪影（右下） -->
  <g opacity="0.18" transform="translate(1050, 300)">
    <rect x="0" y="0" width="200" height="150" rx="18" fill="#7c3aed"/>
    <rect x="20" y="25" width="160" height="8" rx="4" fill="#ffffff"/>
    <rect x="20" y="45" width="130" height="6" rx="3" fill="#ffffff"/>
    <rect x="20" y="60" width="145" height="6" rx="3" fill="#ffffff"/>
    <rect x="20" y="75" width="110" height="6" rx="3" fill="#ffffff"/>
    <rect x="20" y="100" width="60" height="30" rx="6" fill="#ffffff" opacity="0.6"/>
    <rect x="90" y="100" width="60" height="30" rx="6" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 对话气泡（左下） -->
  <g opacity="0.22" transform="translate(1020, 580)">
    <path d="M0 20 Q0 0 20 0 L80 0 Q100 0 100 20 L100 50 Q100 70 80 70 L30 70 L15 90 L15 70 Q0 70 0 50 Z" fill="#e8780f"/>
    <circle cx="22" cy="35" r="4" fill="#ffffff"/>
    <circle cx="50" cy="35" r="4" fill="#ffffff"/>
    <circle cx="78" cy="35" r="4" fill="#ffffff"/>
  </g>

  <!-- 文字/语言字母点缀 -->
  <g font-family="Georgia, 'PingFang SC', serif" fill="#7c3aed" opacity="0.22" font-weight="700">
    <text x="180" y="620" font-size="62">A</text>
    <text x="290" y="680" font-size="52">あ</text>
    <text x="420" y="720" font-size="48">한</text>
    <text x="860" y="760" font-size="50">B</text>
    <text x="980" y="790" font-size="44">文</text>
    <text x="260" y="300" font-size="40">C</text>
    <text x="880" y="200" font-size="36">你</text>
    <text x="1520" cy="750" font-size="44">E</text>
  </g>

  <!-- 主标题区（右侧的语言星球） -->
  <g transform="translate(1230, 450)">
    <circle cx="0" cy="0" r="170" fill="url(#planet2)" opacity="0.55"/>
    <circle cx="0" cy="0" r="150" fill="#ffffff" opacity="0.1"/>
    <circle cx="-30" cy="-40" r="22" fill="#ffffff" opacity="0.3"/>
    <circle cx="35" cy="20" r="14" fill="#ffffff" opacity="0.22"/>
    <circle cx="-10" cy="55" r="10" fill="#ffffff" opacity="0.18"/>
    <text x="-55" y="12" font-size="56" font-family="Georgia, serif" fill="#ffffff" opacity="0.85" font-weight="700">Lang</text>
    <text x="-70" y="60" font-size="56" font-family="Georgia, serif" fill="#ffffff" opacity="0.85" font-weight="700">Verse</text>
  </g>

  <!-- 环 -->
  <g transform="translate(1230, 450)" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.35">
    <ellipse cx="0" cy="0" rx="210" ry="55" transform="rotate(-25 0 0)"/>
  </g>
</svg>
